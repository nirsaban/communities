services:
  postgres:
    image: postgres:16-alpine
    container_name: amutot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-amutot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-amutot_db}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    networks:
      - miltech-association-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-amutot} -d ${POSTGRES_DB:-amutot_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/nirsaban/amutot-backend:${IMAGE_TAG:-latest}
    container_name: amutot-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      GREEN_API_URL: ${GREEN_API_URL}
      GREEN_API_INSTANCE_ID: ${GREEN_API_INSTANCE_ID}
      GREEN_API_TOKEN: ${GREEN_API_TOKEN}
      GREEN_API_ENABLED: ${GREEN_API_ENABLED:-true}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@amutot.cloud}
      OTP_OVERRIDE_PHONE: ${OTP_OVERRIDE_PHONE:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - miltech-association-net
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/v1/health', r => { r.statusCode === 200 ? process.exit(0) : process.exit(1) }).on('error', () => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    image: ghcr.io/nirsaban/amutot-frontend:${IMAGE_TAG:-latest}
    container_name: amutot-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      NEXT_PUBLIC_API_URL: /api/v1
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - miltech-association-net

  nginx:
    image: nginx:alpine
    container_name: amutot-nginx
    restart: unless-stopped
    ports:
      - "0.0.0.0:3100:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - miltech-association-net
    healthcheck:
      # Use 127.0.0.1 explicitly — nginx:alpine resolves `localhost` to IPv6
      # first, but nginx binds IPv4 only, so the spider hits ECONNREFUSED.
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  miltech-association-net:
    external: true
