# nginx config baked into the web container. Serves the SPA + proxies
# /api/v1/* to the api container over the internal docker network.
#
# We deliberately DON'T use an `upstream {}` block because that resolves DNS
# at startup — and `api` doesn't resolve outside docker-compose, which makes
# the image unusable for any standalone smoke test. Instead we point
# proxy_pass at a variable and let nginx resolve `api` per-request via
# Docker's embedded resolver. nginx returns 502 if the api is down, instead
# of refusing to start.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # 127.0.0.11 is the Docker embedded DNS resolver. Outside docker, the
    # `valid=` keeps things tight; inside compose, the `api` service name
    # resolves fine.
    resolver 127.0.0.11 ipv6=off valid=10s;

    # Generous body size for uploads (event covers, materials).
    client_max_body_size 25M;

    # gzip text-ish responses.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;
    gzip_min_length 1024;

    # Health endpoint for the container's healthcheck and external monitors.
    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # API proxy. Keep the path intact: /api/v1/foo → http://api:4242/api/v1/foo.
    # Webhook routes need raw bodies; nginx's default request buffering hands
    # the full body to the upstream, which is fine for express.raw().
    location /api/ {
        set $api_upstream "http://api:4242";
        proxy_pass         $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
    }

    # Cache fingerprinted Vite assets aggressively.
    location /assets/ {
        root /usr/share/nginx/html;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Service worker + manifest — short cache so updates ship fast.
    location = /sw.js {
        root /usr/share/nginx/html;
        access_log off;
        add_header Cache-Control "no-cache";
    }
    location = /manifest.webmanifest {
        root /usr/share/nginx/html;
        access_log off;
        add_header Cache-Control "no-cache";
    }
    location = /registerSW.js {
        root /usr/share/nginx/html;
        access_log off;
        add_header Cache-Control "no-cache";
    }

    # SPA fallback — every other path returns index.html so react-router owns routing.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;

        # Don't cache the HTML shell — we always want the latest entry point.
        add_header Cache-Control "no-cache";
    }
}
