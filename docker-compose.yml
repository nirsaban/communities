services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/community
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-only-access-secret-change-me-please}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-only-refresh-secret-change-me-please}
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 30d
      CORS_ORIGINS: '*'
      MAIL_DRIVER: console
      STORAGE_DRIVER: local
      UPLOAD_DIR: /app/uploads
      API_BASE_URL: http://localhost:3000
      LOG_LEVEL: info
    ports:
      - '3000:3000'
    volumes:
      - api_uploads:/app/uploads

volumes:
  mongo_data:
  api_uploads:
