name: deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'AUDIT.md'
      - 'agents/**'
  workflow_dispatch:

# Only one deploy at a time; cancel an in-flight one when a newer commit lands.
concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy:
    # Self-hosted runner installed on the VPS via infra/install-github-runner.sh.
    # The VPS firewall blocks inbound SSH from GitHub's hosted runners, so we
    # run the deploy locally on the host instead.
    runs-on: [self-hosted, communities]
    environment: prod
    timeout-minutes: 25

    steps:
      - name: Checkout commit being deployed
        uses: actions/checkout@v4

      - name: Sync working tree to /opt/communities
        run: |
          # The runner checks code into /opt/actions-runner/_work/... but the
          # deployed tree lives in /opt/communities. Mirror everything (minus
          # the usual junk) so the docker build sees the latest code.
          sudo rsync -az --delete \
            --exclude='.git/' \
            --exclude='node_modules/' \
            --exclude='backend/dist/' \
            --exclude='backend/uploads/' \
            --exclude='backend/coverage/' \
            --exclude='web/dist/' \
            --exclude='web/.vite/' \
            --exclude='.env' \
            --exclude='.env.prod' \
            --exclude='.claude/' \
            "$GITHUB_WORKSPACE/" /opt/communities/

      - name: Ensure .env.prod exists and has every key from the example
        run: |
          cd /opt/communities
          if [ ! -f .env.prod ]; then
            sudo cp infra/.env.prod.example .env.prod
            sudo chmod 600 .env.prod
            JWT_A=$(openssl rand -hex 32)
            JWT_R=$(openssl rand -hex 32)
            sudo sed -i "s|REPLACE_WITH_RANDOM_32_BYTE_HEX|$JWT_A|" .env.prod
            sudo sed -i "s|REPLACE_WITH_DIFFERENT_RANDOM_32_BYTE_HEX|$JWT_R|" .env.prod
            echo "Generated fresh JWT secrets into .env.prod"
          fi
          added=()
          while IFS= read -r line; do
            case "$line" in ''|\#*) continue ;; esac
            key="${line%%=*}"
            if ! grep -qE "^[[:space:]]*${key}=" .env.prod; then
              echo "$line" | sudo tee -a .env.prod >/dev/null
              added+=("$key")
            fi
          done < infra/.env.prod.example
          if [ ${#added[@]} -gt 0 ]; then
            echo "Added missing keys from example: ${added[*]}"
          fi

      - name: Build + restart containers
        run: |
          cd /opt/communities
          sudo docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build

      - name: Health check
        run: |
          sleep 8
          echo "→ api /health"
          curl -fsS --max-time 10 http://localhost:3010/api/v1/health | head -c 300
          echo
          echo "→ web /healthz"
          curl -fsS --max-time 10 http://localhost:3011/healthz
          echo
          echo "→ web → api proxy"
          curl -fsS --max-time 10 http://localhost:3011/api/v1/health | head -c 300

      - name: Summary
        if: always()
        env:
          HOST_IP: ${{ secrets.DEPLOY_HOST_IP }}
        run: |
          {
            echo "### Deploy summary"
            echo
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Triggered by | ${{ github.actor }} |"
            echo "| Runner | self-hosted on the VPS |"
            if [ -n "$HOST_IP" ]; then
              echo "| Web | http://$HOST_IP:3011/ |"
              echo "| API direct | http://$HOST_IP:3010/api/v1/health |"
              echo "| API via web | http://$HOST_IP:3011/api/v1/health |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
