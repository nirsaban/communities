# Nginx reverse proxy for the communities API.
#
# Two server blocks:
#   1. HTTP on port 80 — serves the Let's Encrypt acme-challenge directory and
#      301-redirects everything else to HTTPS.
#   2. HTTPS on port 443 — terminates TLS and proxies to the api container.
#
# Until a real domain + cert is provisioned, the HTTPS block is commented out
# and the HTTP block proxies directly. Uncomment + adjust `server_name` after
# running the certbot bootstrap in infra/README.md.

upstream api_upstream {
    server api:3000;
    keepalive 32;
}

# -----------------------------------------------------------------------------
# HTTP (port 80)
# -----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Let's Encrypt webroot challenge — keep this even after TLS is set up,
    # certbot renewal needs it.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # === Pre-TLS mode (current) ===
    # Proxy directly until a domain + cert are issued. Remove this block
    # and uncomment the redirect below once HTTPS is live.
    location / {
        proxy_pass         http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        client_max_body_size 25M;
    }

    # === Post-TLS mode ===
    # Uncomment after the HTTPS server block below is enabled:
    # location / {
    #     return 301 https://$host$request_uri;
    # }
}

